name: API Tests con Newman

on: [push, pull_request]

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Compilar JAR
        run: mvn -B package -DskipTests

      - name: Iniciar aplicacion en segundo plano
        run: java -jar target/*.jar &

      - name: Esperar que la aplicacion responda
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:8080/api/tareas && break
            sleep 2
          done

      - name: Instalar Newman
        run: npm install -g newman

      - name: Ejecutar coleccion con Newman
        run: newman run postman/ColeccionToDo.json --environment postman/env-ci.json